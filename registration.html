<!-- REGISTRATION FORM -->
<div class="container my-5 flex-grow-1">

<div class="card p-4 shadow bg-dark text-light">

<h3>Create Account</h3>

<details ontoggle="showInstructions()">
<summary><u>Instructions</u></summary>
<p id="instructionMessage"></p>
</details>

<hr>

<div class="row g-3">

<div class="col-md-6">
<input type="text" class="form-control" id="firstName" placeholder="First Name">
</div>

<div class="col-md-6">
<input type="text" class="form-control" id="lastName" placeholder="Last Name">
</div>

<div class="col-md-6">
<input type="email" class="form-control" id="email" placeholder="Email">
</div>

<div class="col-md-6">
<input type="tel" class="form-control" id="phone" placeholder="Phone Number">
</div>

<div class="col-md-6">
<input type="password" class="form-control" id="password" placeholder="Password">
</div>

<div class="col-md-6">
<input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password">
</div>

</div>

<button class="btn btn-primary w-100 mt-4" onclick="registerUser()">
Register
</button>

<button class="btn btn-info w-100 mt-2" type="reset">
Clear All
</button>
